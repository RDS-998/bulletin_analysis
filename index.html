<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protezione Civile Lazio - Analizzatore Bollettini</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  
  <script src="data.js?v=2"></script>
</head>
<body>
  <div class="app-container">
    <header class="main-header">
      <div class="header-logo-area">
        <svg class="app-logo" viewBox="0 0 100 100" width="48" height="48">
          <circle cx="50" cy="50" r="46" fill="#0f172a" stroke="#ea580c" stroke-width="3"/>
          <polygon points="50,15 80,75 20,75" fill="#ea580c"/>
          <polygon points="50,30 70,70 30,70" fill="#eab308"/>
          <text x="50" y="88" font-family="'Outfit', sans-serif" font-weight="800" font-size="12" fill="#ffffff" text-anchor="middle">PC LAZIO</text>
        </svg>
        <div class="header-title">
          <h1>Generatore Post - Protezione Civile</h1>
          <p>Analisi automatica e creazione grafiche (Client-Side via CORS Proxy)</p>
        </div>
      </div>
      
      <div class="control-panel">
        <div class="input-group">
          <label for="select-bulletin-date">Data Bollettino:</label>
          <input type="date" id="select-bulletin-date" class="form-control" />
          <small id="update-status" class="text-muted" style="color:var(--text-muted);font-size:0.8rem;margin-top:4px;">In attesa di aggiornamento...</small>
        </div>
      </div>
    </header>

    <main class="main-content">
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Analisi in corso tramite corsproxy.io...</p>
      </div>

      <div class="grid-layout">
        <!-- Editor Column -->
        <div class="editor-column">
          <div class="card">
            <h2>Rischio Idrogeologico</h2>
            <div id="hydro-zones" class="zones-grid"></div>
          </div>
          <div class="card mt-4">
            <h2>Rischio Incendi Boschivi (AIB)</h2>
            <div id="aib-zones" class="zones-grid"></div>
          </div>
          
          <div class="card mt-4">
            <h2>Testo per Social</h2>
            <div class="social-options">
              <label><input type="checkbox" id="chk-hashtags" checked /> Usa Hashtags</label>
              <label><input type="checkbox" id="chk-contacts" checked /> Includi Contatti</label>
            </div>
            <textarea id="social-post-text" class="form-control mt-2" rows="10"></textarea>
            <button id="btn-copy" class="btn btn-secondary mt-2">Copia Testo</button>
          </div>
        </div>

        <!-- Canvas / Preview Column -->
        <div class="preview-column">
          <div class="card">
            <div class="card-header-flex">
              <h2>Grafiche Generate</h2>
              <div class="btn-group">
                <button id="btn-download-1x1" class="btn btn-secondary btn-sm">Scarica 1:1</button>
                <button id="btn-download-9x16" class="btn btn-secondary btn-sm">Scarica 9:16</button>
              </div>
            </div>
            <div class="canvas-container">
              <canvas id="canvas-1x1" width="1080" height="1080" class="preview-canvas"></canvas>
            </div>
            <div class="canvas-container mt-4">
              <canvas id="canvas-9x16" width="1080" height="1920" class="preview-canvas"></canvas>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
